<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WWE Checklist Calendar 2021-2026</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07090f;
      --panel: #101522;
      --panel-2: #151b2b;
      --line: rgba(148, 163, 184, .22);
      --text: #f8fafc;
      --muted: #94a3b8;
      --raw: #ef4444;
      --sd: #3b82f6;
      --ppv: #f59e0b;
      --ok: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button, input {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 104px minmax(0, 1fr);
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 1px solid rgba(239, 68, 68, .24);
      background: #090d16;
      padding: 14px 10px;
      overflow: auto;
    }

    .brand {
      display: grid;
      gap: 2px;
      margin-bottom: 16px;
      padding: 8px;
    }

    .brand strong {
      font-size: 20px;
      line-height: 1;
      font-weight: 950;
    }

    .brand span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
      text-transform: uppercase;
    }

    .years {
      display: grid;
      gap: 8px;
      flex-shrink: 0;
    }

    .year-btn {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(15, 23, 42, .72);
      color: #cbd5e1;
      cursor: pointer;
      font-weight: 900;
    }

    .year-btn.active {
      border-color: rgba(245, 158, 11, .7);
      background: #f59e0b;
      color: #111827;
      box-shadow: 0 14px 34px rgba(245, 158, 11, .2);
    }

    main {
      min-width: 0;
      padding: 18px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      margin: -18px -18px 18px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(148, 163, 184, .16);
      background: rgba(7, 9, 15, .92);
      backdrop-filter: blur(10px);
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 42px);
      line-height: 1;
      font-weight: 950;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(15, 23, 42, .72);
      padding: 8px 10px;
      min-width: 86px;
    }

    .stat b {
      display: block;
      font-size: 17px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto auto auto;
      gap: 10px;
      align-items: center;
    }

    .search {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(15, 23, 42, .72);
      color: var(--text);
      padding: 0 12px;
      outline: none;
    }

    .search:focus {
      border-color: rgba(245, 158, 11, .58);
    }

    .segments {
      display: flex;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 4px;
      background: rgba(15, 23, 42, .72);
    }

    .seg {
      min-height: 32px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #cbd5e1;
      cursor: pointer;
      padding: 0 10px;
      font-size: 12px;
      font-weight: 900;
    }

    .seg.active {
      color: #111827;
      background: #f59e0b;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 10px;
      background: rgba(15, 23, 42, .72);
      color: #cbd5e1;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 850;
    }

    .toggle input {
      width: 16px;
      height: 16px;
      accent-color: var(--ok);
    }

    .home {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(260px, .65fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(21, 27, 43, .94), rgba(12, 17, 28, .94));
      padding: 15px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 950;
      color: #facc15;
      text-transform: uppercase;
    }

    .last-title {
      margin: 0;
      font-size: 18px;
      font-weight: 950;
      line-height: 1.25;
    }

    .last-meta {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .progress-line {
      height: 8px;
      background: rgba(148, 163, 184, .18);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 12px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #22c55e, #f59e0b);
      border-radius: inherit;
      transition: width .2s ease;
    }

    .month-stack {
      display: grid;
      gap: 12px;
    }

    details.month {
      border: 1px solid rgba(148, 163, 184, .18);
      border-radius: 8px;
      background: rgba(15, 23, 42, .62);
      overflow: hidden;
    }

    details.month[open] {
      border-color: rgba(245, 158, 11, .42);
    }

    summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 14px;
      cursor: pointer;
      list-style: none;
      background: rgba(21, 27, 43, .8);
    }

    summary::-webkit-details-marker {
      display: none;
    }

    .month-name {
      font-size: 15px;
      font-weight: 950;
      color: #facc15;
      text-transform: uppercase;
    }

    .month-count {
      color: #cbd5e1;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }

    .month-meta {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .month-action {
      min-height: 32px;
      border: 1px solid rgba(34, 197, 94, .45);
      border-radius: 8px;
      background: rgba(34, 197, 94, .13);
      color: #bbf7d0;
      cursor: pointer;
      padding: 0 9px;
      font-size: 11px;
      font-weight: 950;
      white-space: nowrap;
    }

    .month-action:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(1, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
    }

    .card {
      min-height: 118px;
      display: grid;
      grid-template-rows: auto 1fr auto auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(7, 9, 15, .62);
      padding: 12px;
    }

    .card.raw { border-color: rgba(239, 68, 68, .3); }
    .card.smackdown { border-color: rgba(59, 130, 246, .35); }
    .card.ppv { border-color: rgba(245, 158, 11, .38); }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .badge {
      border-radius: 999px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 950;
      line-height: 1;
    }

    .badge.raw { background: rgba(239, 68, 68, .16); color: #fecaca; }
    .badge.smackdown { background: rgba(59, 130, 246, .16); color: #bfdbfe; }
    .badge.ppv { background: rgba(245, 158, 11, .18); color: #fde68a; }

    .date {
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 7px;
      color: #cbd5e1;
      font-size: 10px;
      font-weight: 950;
      line-height: 1;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #64748b;
    }

    .status-pill.downloaded {
      border-color: rgba(34, 197, 94, .45);
      color: #bbf7d0;
      background: rgba(34, 197, 94, .12);
    }

    .status-pill.downloaded .status-dot { background: var(--ok); }
    .status-pill.active .status-dot { background: var(--ppv); }
    .status-pill.missing .status-dot { background: #ef4444; }

    .card-title {
      margin: 12px 0;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.25;
    }

    .seen {
      min-height: 38px;
      border: 0;
      border-radius: 8px;
      background: var(--ok);
      color: #052e16;
      cursor: pointer;
      font-weight: 950;
    }

    .seen.undo {
      background: rgba(148, 163, 184, .18);
      color: #e2e8f0;
      border: 1px solid var(--line);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .media-btn {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(15, 23, 42, .88);
      color: #e2e8f0;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 12px;
      font-weight: 950;
    }

    .media-btn.primary {
      border-color: rgba(34, 197, 94, .55);
      background: rgba(34, 197, 94, .16);
      color: #bbf7d0;
    }

    .media-btn.download {
      border-color: rgba(245, 158, 11, .58);
      background: rgba(245, 158, 11, .16);
      color: #fde68a;
    }

    .media-btn:disabled,
    .media-btn.disabled {
      opacity: .48;
      cursor: not-allowed;
    }

    .sd-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      border: 1px solid rgba(34, 197, 94, .34);
      border-radius: 8px;
      background: rgba(34, 197, 94, .1);
      color: #bbf7d0;
      cursor: pointer;
      padding: 0 10px;
      white-space: nowrap;
      font-size: 12px;
      font-weight: 950;
    }

    .hidden-picker {
      position: fixed;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .sheet {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      align-items: end;
      background: rgba(0, 0, 0, .62);
    }

    .sheet[hidden] {
      display: none;
    }

    .sheet-panel {
      max-height: min(78vh, 720px);
      overflow: auto;
      border: 1px solid rgba(148, 163, 184, .22);
      border-radius: 8px 8px 0 0;
      background: #080c15;
      padding: 14px;
      box-shadow: 0 -20px 60px rgba(0, 0, 0, .45);
    }

    .sheet-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .sheet-title {
      margin: 0;
      font-size: 18px;
      font-weight: 950;
    }

    .sheet-close {
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(15, 23, 42, .88);
      color: var(--text);
      cursor: pointer;
      font-weight: 950;
    }

    .download-list {
      display: grid;
      gap: 8px;
    }

    .download-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(15, 23, 42, .72);
      padding: 10px;
    }

    .download-row strong {
      display: block;
      font-size: 13px;
      line-height: 1.2;
    }

    .download-row span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
    }

    .download-row .media-btn {
      min-width: 104px;
    }

    .empty {
      border: 1px dashed rgba(148, 163, 184, .28);
      border-radius: 8px;
      padding: 34px 18px;
      text-align: center;
      color: var(--muted);
      font-weight: 750;
    }

    @media (min-width: 720px) {
      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 1080px) {
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (min-width: 1360px) {
      .grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .app {
        grid-template-columns: 1fr;
      }

      aside {
        position: sticky;
        top: 0;
        z-index: 30;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid rgba(239, 68, 68, .24);
        display: flex;
        align-items: center;
        gap: 10px;
        overflow-x: auto;
      }

      .brand {
        min-width: 72px;
        margin-bottom: 0;
      }

      .years {
        grid-auto-flow: column;
        grid-auto-columns: 72px;
        width: max-content;
      }

      main {
        padding: 14px;
      }

      .topbar {
        position: static;
        margin: -14px -14px 14px;
      }

      .topline,
      .home {
        grid-template-columns: 1fr;
        display: grid;
      }

      .stats {
        justify-content: start;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .segments {
        overflow-x: auto;
      }

      summary {
        align-items: flex-start;
        flex-direction: column;
      }

      .card {
        min-height: 0;
        padding: 14px;
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .media-btn,
      .seen,
      .month-action,
      .sd-tools {
        min-height: 44px;
        font-size: 14px;
      }

      .download-row {
        grid-template-columns: 1fr;
      }

      .download-row .media-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <strong>WWE</strong>
        <span>Checklist</span>
      </div>
      <div class="years" id="years">
        <button class="year-btn" type="button">2021</button>
        <button class="year-btn" type="button">2022</button>
        <button class="year-btn" type="button">2023</button>
        <button class="year-btn" type="button">2024</button>
        <button class="year-btn" type="button">2025</button>
        <button class="year-btn active" type="button">2026</button>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <div class="topline">
          <div>
            <h1 id="heading">Calendario WWE</h1>
            <p class="subtitle" id="subtitle">RAW, SmackDown y PPV/PLE de 2021 a 2026</p>
          </div>
          <div class="stats">
            <div class="stat"><b id="pendingCount">0</b><span>Pendientes</span></div>
            <div class="stat"><b id="seenCount">0</b><span>Vistos</span></div>
            <div class="stat"><b id="downloadedCount">0</b><span>Descargados</span></div>
            <div class="stat"><b id="totalCount">0</b><span>Total</span></div>
          </div>
        </div>
        <div class="controls">
          <input class="search" id="search" type="search" placeholder="Buscar por programa, fecha o PPV">
          <div class="segments" id="filters">
            <button class="seg active" data-filter="ALL" type="button">TODO</button>
            <button class="seg" data-filter="RAW" type="button">RAW</button>
            <button class="seg" data-filter="SMACKDOWN" type="button">SMACKDOWN</button>
            <button class="seg" data-filter="PPV" type="button">PPV</button>
          </div>
          <button class="sd-tools" id="importSd" type="button">Importar SD</button>
          <label class="toggle">
            <input id="showSeen" type="checkbox">
            Mostrar vistos
          </label>
        </div>
      </div>

      <section class="home">
        <div class="panel">
          <h2>Ultimo capitulo visto</h2>
          <p class="last-title" id="lastTitle">Todavia no has marcado ningun capitulo.</p>
          <p class="last-meta" id="lastMeta">Cuando marques uno como visto, aparecera aqui.</p>
        </div>
        <div class="panel">
          <h2>Progreso del ano</h2>
          <p class="last-title" id="progressText">0%</p>
          <p class="last-meta" id="progressMeta">Selecciona un ano para empezar.</p>
          <div class="progress-line"><div class="progress-fill" id="progressFill"></div></div>
        </div>
      </section>

      <section id="calendar" class="month-stack"></section>
      <input class="hidden-picker" id="sdPicker" type="file" accept="video/*,.mp4,.mkv,.mov" multiple>
    </main>
  </div>
  <div class="sheet" id="downloadSheet" hidden>
    <div class="sheet-panel">
      <div class="sheet-head">
        <h2 class="sheet-title" id="sheetTitle">Descargas</h2>
        <button class="sheet-close" id="sheetClose" type="button">X</button>
      </div>
      <div class="download-list" id="downloadList"></div>
    </div>
  </div>

  <script>

    function safeSet(key, value) {

    function parseDate(iso) {
      const [year, month, day] = iso.split("-").map(Number);
      return new Date(Date.UTC(year, month - 1, day, 12));
    }

    function isoDate(date) {
      return date.toISOString().slice(0, 10);
    }

    function addDays(date, days) {
      const next = new Date(date);
      next.setUTCDate(next.getUTCDate() + days);
      return next;
    }

    function dayName(iso) {
      return parseDate(iso).toLocaleDateString("es-MX", { weekday: "long", timeZone: "UTC" });
    }

    function longDate(iso) {
      return parseDate(iso).toLocaleDateString("es-MX", {
        day: "numeric",
        month: "long",
        year: "numeric",
        timeZone: "UTC"
      });
    }

    function shortDate(iso) {
      return parseDate(iso).toLocaleDateString("es-MX", {
        day: "2-digit",
        month: "short",
        timeZone: "UTC"
      });
    }

    function idFor(type, iso, name) {
      return [type, iso, name].join("::").toLowerCase().replace(/[^a-z0-9:]+/g, "-");
    }

    function catalogKey(item) {
      return item.type + "::" + item.date;
    }

    function taskForItem(item) {

    function downloadCatalogEntry(item) {
      const year = Number(item.date.slice(0, 4));
      return downloadCatalog.find(entry => entry.show === item.type && entry.year === year) || null;

    function archiveDownloadUrl(identifier, filename) {
      return ARCHIVE + "/download/" + identifier + "/" + encodeURIComponent(filename);
    }

    function validMediaFile(filename) {
      const lowered = filename.toLowerCase();
      const blocked = [
        ".thumbs/", ".xml", ".sqlite", "_files.xml", "_meta.xml", ".torrent",
        ".jpg", ".png", ".nfo", ".srt", ".idx", ".sub", "__ia_thumb", ".ia.mp4"
      ];
      return (lowered.endsWith(".mp4") || lowered.endsWith(".mkv")) && !blocked.some(part => lowered.includes(part));
    }

    function parseRawDate(filename) {
      const patterns = [
        /WWE\.Monday\.Night\.Raw\.(\d{4})\.(\d{2})\.(\d{2})/i,
        /WWE\.RAW\.(\d{4})\.(\d{2})\.(\d{2})/i,
        /WWE\.Raw\.(\d{4})\.(\d{2})\.(\d{2})/i
      ];
      for (const pattern of patterns) {
        const match = filename.match(pattern);
        if (match) return match[1] + "-" + match[2] + "-" + match[3];
      }
      return null;
    }

    function parseSmackDownDate(filename) {
      let match = filename.match(/(\w{3,9})\.?\s+(\d{1,2}),\s*(\d{4})/);
      if (match && englishMonths[match[1].toLowerCase()]) {
        return match[3] + "-" + englishMonths[match[1].toLowerCase()] + "-" + match[2].padStart(2, "0");
      }
      const patterns = [
        /WWE\.SmackDown\.(\d{4})\.(\d{2})\.(\d{2})/i,
        /WWE\.Friday\.Night\.SmackDown\.(\d{4})\.(\d{2})\.(\d{2})/i,
        /SmackDown\.\d+\.(\w+)\.(\d{1,2})\.(20\d{2})/i,
        /S\d+E\d+[\s._]+SmackDown[\s._]+(\d{4})\.(\d{2})\.(\d{2})/i,
        /SmackDown\s*-\s*S\d+E\d+\s*-\s*(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])-(20\d{2})/i,
        /SmackDown\.(\d{4})\.(\d{2})\.(\d{2})/i,
        /(20\d{2})\.(0[1-9]|1[0-2])\.(0[1-9]|[12]\d|3[01])/,
        /(20\d{2})-(0[1-9]|1[0-2])-(0[1-9]|[12]\d|3[01])/
      ];
      for (let index = 0; index < patterns.length; index += 1) {
        match = filename.match(patterns[index]);
        if (!match) continue;
        if (index === 2 && englishMonths[match[1].toLowerCase()]) {
          return match[3] + "-" + englishMonths[match[1].toLowerCase()] + "-" + match[2].padStart(2, "0");
        }
        if (index === 4) return match[3] + "-" + match[1] + "-" + match[2];
        return match[1] + "-" + match[2] + "-" + match[3];
      }
      return null;
    }

    async function archiveMetadata(identifier) {
      if (metadataCache.has(identifier)) return metadataCache.get(identifier);
      const res = await fetch(ARCHIVE + "/metadata/" + identifier);
      if (!res.ok) throw new Error("No pude cargar el catalogo de archive.org");
      const data = await res.json();
      metadataCache.set(identifier, data);
      return data;
    }

    async function resolveDownload(item) {
      const key = catalogKey(item);
      if (resolvedDownloads.has(key)) return resolvedDownloads.get(key);
      const entry = downloadCatalogEntry(item);
      if (!entry) return null;
      const data = await archiveMetadata(entry.identifier);
      let best = null;
      (data.files || []).forEach(fileInfo => {
        const filename = fileInfo.name || "";
        if (!validMediaFile(filename)) return;
        const foundDate = entry.show === "RAW" ? parseRawDate(filename) : parseSmackDownDate(filename);
        if (foundDate !== item.date) return;
        if (best && best.filename.toLowerCase().endsWith(".mp4") && filename.toLowerCase().endsWith(".mkv")) return;
        best = {
          filename,
          url: archiveDownloadUrl(entry.identifier, filename),
          length: fileInfo.length || "",
          archiveUrl: ARCHIVE + "/details/" + entry.identifier
        };
      });
      resolvedDownloads.set(key, best);
      return best;
    }

    async function downloadDirect(item, button) {
      if (!canDownloadDirect(item)) {
        alert("Este capitulo no tiene enlace directo de descarga en la app.");
        return;
      }
      const original = button.textContent;
      button.disabled = true;
      button.textContent = "Buscando...";
      try {
        const resolved = await resolveDownload(item);
        if (!resolved) {
          alert("No encontre el archivo de este capitulo.");
          return;
        }
        triggerDownload(resolved);
      } catch {
        alert("No pude preparar la descarga. Revisa tu conexion e intenta otra vez.");
      } finally {
        button.disabled = false;
        button.textContent = original;
      }
    }

    function triggerDownload(resolved) {
      const link = document.createElement("a");
      link.href = resolved.url;
      link.target = "_blank";
      link.rel = "noopener";
      link.download = resolved.filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
    }

    function sdRecordForItem(item) {
      return sdLibrary[catalogKey(item)] || null;
    }

    function hasLocalFile(item) {
      return Boolean(sdRecordForItem(item) || sessionFiles.has(catalogKey(item)));
    }

    function normalizeText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
    }

    function dateTokens(iso) {
      const [year, month, day] = iso.split("-");
      const monthName = normalizeText(monthNames[Number(month) - 1]);
      return [
        iso,
        iso.replaceAll("-", "."),
        month + "-" + day + "-" + year,
        month + "." + day + "." + year,
        day + "-" + month + "-" + year,
        day + "." + month + "." + year,
        Number(day) + " de " + monthName + " de " + year,
        Number(day) + " de " + monthName + " del " + year
      ];
    }

    function fileMatchesItem(file, item) {
      const name = normalizeText(file.name);
      const typeNeedle = item.type === "SMACKDOWN" ? "smackdown" : item.type.toLowerCase();
      const typeMatches = item.type === "PPV" ? normalizeText(item.title).split(/\s+/).filter(Boolean).some(part => name.includes(part)) : name.includes(typeNeedle);
      if (!typeMatches) return false;
      return dateTokens(item.date).some(token => name.includes(normalizeText(token)));
    }

    function findItemForFile(file) {
      for (const year of YEARS) {
        const match = allItemsForYear(year).find(item => fileMatchesItem(file, item));
        if (match) return match;
      }
      return null;
    }

    function rememberFileForItem(file, item) {
      const key = catalogKey(item);
      sessionFiles.set(key, file);
      sdLibrary[key] = {
        name: file.name,
        size: file.size || 0,
        lastModified: file.lastModified || 0,
        addedAt: Date.now()
      };
    }

    function handleSdFiles(files) {
      const list = Array.from(files || []);
      let matched = 0;
      if (pendingPickItem && list.length) {
        rememberFileForItem(list[0], pendingPickItem);
        openLocalFile(pendingPickItem);
        pendingPickItem = null;
        saveSdLibrary();
        render();
        sdPickerEl.value = "";
        return;
      }
      list.forEach(file => {
        const item = findItemForFile(file);
        if (!item) return;
        rememberFileForItem(file, item);
        matched += 1;
      });
      saveSdLibrary();
      render();
      sdPickerEl.value = "";
      if (!matched && list.length) alert("No pude empatar esos archivos con el calendario. Prueba elegir el video desde la tarjeta exacta.");
    }

    function pickFileForItem(item) {
      pendingPickItem = item;
      sdPickerEl.multiple = false;
      sdPickerEl.click();

    function importSdFiles() {
      pendingPickItem = null;

    function openLocalFile(item) {
      const file = sessionFiles.get(catalogKey(item));
      if (!file) {
        pickFileForItem(item);
        return;
      }
      const url = URL.createObjectURL(file);
      seen.add(item.id);
      setLastSeen(item);
      saveSeen();
      window.open(url, "_blank");

    function monthDownloadItems(monthKey) {
      return allItemsForYear(selectedYear).filter(item => {
        if (!item.date.startsWith(monthKey)) return false;
        if (!["RAW", "SMACKDOWN", "PPV"].includes(item.type)) return false;
        if (activeFilter === "RAW" || activeFilter === "SMACKDOWN") return item.type === activeFilter;
        if (activeFilter === "PPV") return item.type === "PPV";
        return true;
      });
    }

    async function startMonthDownload(monthKey, button) {
      const items = monthDownloadItems(monthKey).filter(canDownloadDirect);
      if (!items.length) {
        alert("Este mes no tiene enlaces directos de descarga con este filtro.");
        return;
      }
      const original = button.textContent;
      button.disabled = true;
      button.textContent = "Preparando...";
      try {
        const resolved = [];
        for (let index = 0; index < items.length; index += 1) {
          button.textContent = "Preparando " + (index + 1) + "/" + items.length;
          const item = items[index];
          const link = await resolveDownload(item);
          if (link) resolved.push({ item, link });
        }
        if (!resolved.length) {
          alert("No encontre archivos descargables para este mes.");
          return;
        }
        button.textContent = "Descargando " + resolved.length;
        resolved.forEach((entry, index) => {
          setTimeout(() => triggerDownload(entry.link), index * 450);
        });
        openMonthDownloads(monthKey, items, resolved);
      } catch {
        alert("No pude preparar las descargas del mes. Revisa tu conexion e intenta otra vez.");
      } finally {
        button.disabled = false;
        button.textContent = original;
      }
    }

    function openMonthDownloads(monthKey, items, resolvedEntries = []) {
      const resolvedMap = new Map(resolvedEntries.map(entry => [catalogKey(entry.item), entry.link]));
      const [year, month] = monthKey.split("-").map(Number);

    function closeDownloadSheet() {

    function generateWeekly(type, weekday, year) {
      const start = parseDate(year + "-01-01");
      const end = parseDate(year + "-12-31");
      const items = [];
      let current = start;
      while (current.getUTCDay() !== weekday) current = addDays(current, 1);
      while (current <= end) {
        const iso = isoDate(current);
        const label = type === "RAW" ? "RAW" : "SmackDown";
        items.push({
          id: idFor(type, iso, label),
          type,
          date: iso,
          title: label + " - " + longDate(iso),
          sort: iso + "-" + (type === "RAW" ? "1" : "2")
        });
        current = addDays(current, 7);
      }
      return items;
    }

    function allItemsForYear(year) {
      const raw = generateWeekly("RAW", 1, year);
      const sd = generateWeekly("SMACKDOWN", 5, year);
      const ppv = ppvEvents
        .filter(([iso]) => iso.startsWith(String(year)))
        .map(([iso, name]) => ({
          id: idFor("PPV", iso, name),
          type: "PPV",
          date: iso,
          title: name,
          sort: iso + "-0"
        }));
      return [...raw, ...sd, ...ppv].sort((a, b) => a.sort.localeCompare(b.sort));
    }

    function visibleItems(items) {
      const needle = query.trim().toLowerCase();
      return items.filter(item => {
        if (activeFilter !== "ALL" && item.type !== activeFilter) return false;
        if (!showSeen && seen.has(item.id)) return false;
        if (!needle) return true;
        return [
          item.title,
          item.type,
          item.date,
          longDate(item.date),
          dayName(item.date)
        ].join(" ").toLowerCase().includes(needle);
      });
    }

    function renderHome(allItems) {
      const last = readLastSeen();
      const lastTitle = document.getElementById("lastTitle");
      const lastMeta = document.getElementById("lastMeta");
      if (last) {
        lastTitle.textContent = last.title;
        lastMeta.textContent = last.typeLabel || labelForType(last.type) + " - " + longDate(last.date) + " - marcado " + new Date(last.at).toLocaleString("es-MX");
      } else {
        lastTitle.textContent = "Todavia no has marcado ningun capitulo.";
        lastMeta.textContent = "Cuando marques uno como visto, aparecera aqui.";
      }

      const total = allItems.length;
      const seenCount = allItems.filter(item => seen.has(item.id)).length;
      const pending = total - seenCount;
      const percent = total ? Math.round((seenCount / total) * 100) : 0;

      document.getElementById("pendingCount").textContent = pending;
      document.getElementById("seenCount").textContent = seenCount;
      document.getElementById("downloadedCount").textContent = allItems.filter(item => {
        const task = taskForItem(item);
        return (task && task.status === "completed") || hasLocalFile(item);
      }).length;
      document.getElementById("totalCount").textContent = total;
      document.getElementById("progressText").textContent = percent + "%";
      document.getElementById("progressMeta").textContent = seenCount + " de " + total + " eventos marcados en " + selectedYear;
      document.getElementById("progressFill").style.width = percent + "%";
    }

    function labelForType(type) {
      if (type === "SMACKDOWN") return "SmackDown";
      if (type === "PPV") return "PPV/PLE";
      return "RAW";
    }

    function typeClass(type) {
      return type === "SMACKDOWN" ? "smackdown" : type.toLowerCase();
    }

    function groupByMonth(items) {
      const groups = new Map();
      items.forEach(item => {
        const key = item.date.slice(0, 7);
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(item);
      });
      return groups;
    }

    function renderCard(item) {
      const card = document.createElement("article");
      const isSeen = seen.has(item.id);
      card.className = "card " + typeClass(item.type);

      const head = document.createElement("div");
      head.className = "card-head";
      const badge = document.createElement("span");
      badge.className = "badge " + typeClass(item.type);
      badge.textContent = labelForType(item.type);
      const right = document.createElement("div");
      right.style.display = "flex";
      right.style.alignItems = "center";
      right.style.gap = "6px";
      const status = document.createElement("span");
      const task = taskForItem(item);
      const downloaded = (task && task.status === "completed") || hasLocalFile(item);
      status.className = "status-pill " + (downloaded ? "downloaded" : "missing");
      status.innerHTML = '<span class="status-dot"></span>' + (downloaded ? "SD" : "No SD");
      const date = document.createElement("span");
      date.className = "date";
      date.textContent = shortDate(item.date);
      right.append(status, date);
      head.append(badge, right);

      const title = document.createElement("p");
      title.className = "card-title";
      title.textContent = item.title;

      const button = document.createElement("button");
      button.type = "button";
      button.className = "seen" + (isSeen ? " undo" : "");
      button.textContent = isSeen ? "Quitar visto" : "Marcar visto";
      button.addEventListener("click", () => {
        if (seen.has(item.id)) {
          seen.delete(item.id);
        } else {
          seen.add(item.id);
          setLastSeen(item);
        }
        saveSeen();
        render();
      });

      const actions = document.createElement("div");
      actions.className = "actions";
      const downloadBtn = document.createElement("button");
      downloadBtn.type = "button";
      downloadBtn.className = "media-btn download";
      downloadBtn.textContent = canDownloadDirect(item) ? "Descargar" : "Sin descarga";
      downloadBtn.disabled = !canDownloadDirect(item);
      downloadBtn.addEventListener("click", () => {
        downloadDirect(item, downloadBtn);
      });

      if (downloaded) {
        const watch = document.createElement("button");
        watch.type = "button";
        watch.className = "media-btn primary";
        watch.textContent = sessionFiles.has(catalogKey(item)) ? "Ver SD" : "Elegir video";
        watch.addEventListener("click", () => openLocalFile(item));
        actions.append(downloadBtn, watch);
      } else {
        const watch = document.createElement("button");
        watch.type = "button";
        watch.className = "media-btn primary";
        watch.textContent = "Elegir video";
        watch.addEventListener("click", () => pickFileForItem(item));
        actions.append(downloadBtn, watch);
      }

      card.append(head, title, button, actions);
      return card;
    }

    function renderCalendar(items) {
      calendarEl.innerHTML = "";

        const empty = document.createElement("div");

      const groups = groupByMonth(items);
      Array.from(groups.keys()).sort().forEach((key, index) => {
        const [year, month] = key.split("-").map(Number);
        const details = document.createElement("details");

        name.className = "month-name";
        name.textContent = monthNames[month - 1] + " " + year;
        const count = document.createElement("span");
        count.className = "month-count";
        count.textContent = groups.get(key).length + " visibles";
        const meta = document.createElement("div");
        meta.className = "month-meta";
        const monthItems = monthDownloadItems(key);
        const readyCount = monthItems.filter(item => {
          const task = taskForItem(item);
          return hasLocalFile(item) || (task && task.status === "completed");
        }).length;
        const action = document.createElement("button");
        action.type = "button";
        action.className = "month-action";
        action.textContent = "Descargar todo";
        action.disabled = !monthItems.length;
        action.title = readyCount + "/" + monthItems.length + " capitulos en SD";
        action.addEventListener("click", event => {
          event.preventDefault();
          event.stopPropagation();
          startMonthDownload(key, action);
        });
        meta.append(count, action);
        summary.append(name, meta);

        const grid = document.createElement("div");
        grid.className = "grid";
        groups.get(key).forEach(item => grid.appendChild(renderCard(item)));

        details.append(summary, grid);
        calendarEl.appendChild(details);
      });
    }

    function render() {
      const all = allItemsForYear(selectedYear);
      const items = visibleItems(all);
      headingEl.textContent = "Calendario WWE " + selectedYear;
      subtitleEl.textContent = "RAW, SmackDown y PPV/PLE - " + (showSeen ? "mostrando vistos" : "ocultando vistos");
      renderYears();
      renderHome(all);
      renderCalendar(items);
    }

    document.getElementById("filters").addEventListener("click", event => {
      const button = event.target.closest("button[data-filter]");
      if (!button) return;
      activeFilter = button.dataset.filter;
      document.querySelectorAll(".seg").forEach(seg => seg.classList.toggle("active", seg === button));
      render();
    });

    searchEl.addEventListener("input", event => {
      query = event.target.value;
      render();
    });

    showSeenEl.addEventListener("change", event => {
      showSeen = event.target.checked;
      render();
    });

    document.getElementById("importSd").addEventListener("click", importSdFiles);
    sdPickerEl.addEventListener("change", event => handleSdFiles(event.target.files));
    document.getElementById("sheetClose").addEventListener("click", closeDownloadSheet);
    downloadSheetEl.addEventListener("click", event => {
      if (event.target === downloadSheetEl) closeDownloadSheet();
    });

    render();
  </script>
</body>
</html>
