    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>WWE Archive Viewer – TheSquaredCircle1996</title>
    <script>
      window.__renderWweTodoMonths = function (M, EpisodeCard, PpvCard, items, watched, onPlay, onToggleWatched) {
        const monthNames = {
          "01": "Enero", "02": "Febrero", "03": "Marzo", "04": "Abril",
          "05": "Mayo", "06": "Junio", "07": "Julio", "08": "Agosto",
          "09": "Septiembre", "10": "Octubre", "11": "Noviembre", "12": "Diciembre"
        };
        const groups = new Map();
        items.forEach(function (item) {
          const date = item.kind === "episode" ? item.ep.date : item.ppv.date;
          const key = date ? date.slice(0, 7) : "Sin fecha";
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(item);
        });
        const blocks = Array.from(groups.keys()).sort().map(function (key, index) {
          const monthItems = groups.get(key);
          const title = key === "Sin fecha" ? "Sin fecha" : (monthNames[key.slice(5, 7)] || key.slice(5, 7)) + " " + key.slice(0, 4);
          return M.jsxs("details", {
            className: "wwe-month-card",
            open: index === 0,
            children: [
              M.jsxs("summary", {
                children: [
                  M.jsx("span", { className: "wwe-month-title", children: title }),
                  M.jsx("span", { className: "wwe-month-count", children: monthItems.length + " elementos" })
                ]
              }),
              M.jsx("div", {
                className: "wwe-month-grid",
                children: monthItems.map(function (item, itemIndex) {
                  if (item.kind === "ppv") {
                    return M.jsx("div", {
                      className: "wwe-ppv-item",
                      children: M.jsx(PpvCard, { ppv: item.ppv })
                    }, "ppv-" + item.ppv.date + "-" + itemIndex);
                  }
                  return M.jsx(EpisodeCard, {
                    episode: item.ep,
                    isWatched: watched.has(item.ep.id),
                    onPlay: onPlay,
                    onToggleWatched: onToggleWatched
                  }, item.ep.id);
                })
              })
            ]
          }, "month-" + key);
        });
        return M.jsx("div", { className: "wwe-month-stack", children: blocks });
      };
    </script>

  <body>
    <div id="root"></div>
    <script>
      (function () {
        const toast = document.createElement("div");
        toast.setAttribute("id", "iphone-download-toast");
        toast.style.cssText = [
          "position:fixed",
          "left:50%",
          "bottom:20px",
          "transform:translateX(-50%)",
          "max-width:min(92vw,420px)",
          "padding:12px 14px",
          "border-radius:12px",
          "background:rgba(15,23,42,.94)",
          "color:#fff",
          "font:500 14px/1.4 -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif",
          "box-shadow:0 12px 32px rgba(0,0,0,.35)",
          "z-index:99999",
          "opacity:0",
          "pointer-events:none",
          "transition:opacity .2s ease"
        ].join(";");
        const chooserOverlay = document.createElement("div");
        chooserOverlay.setAttribute("id", "iphone-episode-chooser");
        chooserOverlay.style.cssText = [
          "position:fixed",
          "inset:0",
          "display:none",
          "align-items:flex-end",
          "justify-content:center",
          "padding:16px",
          "background:rgba(2,6,23,.72)",
          "backdrop-filter:blur(8px)",
          "-webkit-backdrop-filter:blur(8px)",
          "z-index:99998"
        ].join(";");
        chooserOverlay.innerHTML = [
          '<div style="width:min(100%,420px);background:#0f172a;color:#fff;border:1px solid rgba(148,163,184,.18);border-radius:18px;padding:18px 16px 14px;box-shadow:0 24px 64px rgba(0,0,0,.45)">',
          '<div id="iphone-episode-title" style="font:700 16px/1.35 -apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;margin:0 0 14px;word-break:break-word"></div>',
          '<div style="display:grid;grid-template-columns:1fr;gap:10px">',
          '<button type="button" data-action="mac-command" style="appearance:none;border:none;border-radius:14px;padding:15px 12px;background:#22c55e;color:#052e16;font:800 15px/1.2 -apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif">Copiar comando para Mac</button>',
          '<button type="button" data-action="external-manager" style="appearance:none;border:1px solid rgba(34,197,94,.36);border-radius:14px;padding:14px 12px;background:rgba(34,197,94,.12);color:#bbf7d0;font:750 14px/1.2 -apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif">Abrir en gestor externo</button>',
          '<button type="button" data-action="download" style="appearance:none;border:1px solid rgba(34,197,94,.26);border-radius:14px;padding:14px 12px;background:rgba(15,23,42,.72);color:#bbf7d0;font:750 14px/1.2 -apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif">Descargar con Atajo</button>',
          '<button type="button" data-action="copy" style="appearance:none;border:1px solid rgba(148,163,184,.32);border-radius:14px;padding:14px 12px;background:rgba(15,23,42,.72);color:#e2e8f0;font:750 14px/1.2 -apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif">Copiar enlace</button>',
          '</div>',
          '<button type="button" data-action="cancel" style="appearance:none;border:none;background:transparent;color:#94a3b8;font:600 14px/1.2 -apple-system,BlinkMacSystemFont,\'Segoe UI\',sans-serif;width:100%;padding:14px 10px 2px;margin-top:6px">Cancelar</button>',
          '</div>'
        ].join("");
        const IOS_SHORTCUT_NAME = "Guardar Video Archive";
        const playerOverlay = document.createElement("div");
        playerOverlay.setAttribute("id", "iphone-inline-player");
        playerOverlay.style.cssText = [
          "position:fixed",
          "inset:0",
          "display:none",
          "align-items:center",
          "justify-content:center",
          "padding:14px",
          "background:#020617",
          "z-index:99997"
        ].join(";");
        playerOverlay.innerHTML = [
          '<div class="iphone-player-bar">',
          '<div class="iphone-player-copy">',
          '<div id="iphone-player-title"></div>',
          '<div id="iphone-player-source" class="iphone-player-source iphone-player-source-archive">ARCHIVE · usa datos</div>',
          '</div>',
          '<button type="button" data-action="close-player" class="iphone-player-close">Cerrar</button>',
          '</div>',
          '<video id="iphone-native-video" controls playsinline webkit-playsinline preload="metadata" controlslist="nodownload"></video>'
        ].join("");
        let activeCard = null;
        let activeDownloadAnchor = null;
        let allowNextCardOpen = false;
        let localVideoCount = 0;
        let currentLocalVideoUrl = "";
        const localVideoFiles = new Map();
        const localFileInput = document.createElement("input");
        localFileInput.type = "file";
        localFileInput.multiple = true;
        localFileInput.accept = "video/*,.mp4,.m4v,.mov,.webm,.mkv";
        localFileInput.setAttribute("webkitdirectory", "");
        localFileInput.setAttribute("directory", "");
        localFileInput.style.display = "none";
        localFileInput.addEventListener("change", function () {
          indexLocalVideoFiles(Array.from(localFileInput.files || []));
          localFileInput.value = "";
        });
        const localVideosInput = document.createElement("input");
        localVideosInput.type = "file";
        localVideosInput.multiple = true;
        localVideosInput.accept = "video/*,.mp4,.m4v,.mov,.webm,.mkv";
        localVideosInput.style.display = "none";
        localVideosInput.addEventListener("change", function () {
          const files = Array.from(localVideosInput.files || []);
          indexLocalVideoFiles(files);
          if (files.length === 1) {
            playLocalVideoFile(files[0]);
          } else if (files.length > 1) {
            showToast("Listo: " + files.length + " videos seleccionados. Toca un capitulo con etiqueta SD.");
          }
          localVideosInput.value = "";
        });
        document.addEventListener("click", strictDownloadClickGuard, true);
        document.addEventListener("DOMContentLoaded", function () {
          document.body.appendChild(toast);
          document.body.appendChild(chooserOverlay);
          document.body.appendChild(playerOverlay);
          document.body.appendChild(localFileInput);
          document.body.appendChild(localVideosInput);
          playerOverlay.style.display = "none";
          patchInlineVideos(document);
        });

        let toastTimer = null;
        function showToast(message) {
          toast.textContent = message;
          toast.style.opacity = "1";
          clearTimeout(toastTimer);
          toastTimer = setTimeout(function () {
            toast.style.opacity = "0";
          }, 4200);
        }

        function isAppleMobile() {
          const ua = navigator.userAgent || "";
          return /iPhone|iPad|iPod/i.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        }

        function findEpisodeCard(node) {
          if (!node || !node.closest) return null;
          return node.closest("div.cursor-pointer.group.overflow-hidden");
        }

        function getEpisodeTitle(card) {
          if (!card) return "Episodio";
          const title = card.querySelector("p.text-white");
          return title ? title.textContent.trim() : "Episodio";
        }

        function sanitizeFilenamePart(value) {
          return String(value || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/[^a-zA-Z0-9._-]+/g, "-")
            .replace(/^-+|-+$/g, "")
            .slice(0, 80);
        }

        function sanitizeReadableFilename(value) {
          return String(value || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/[\\/:*?"<>|]+/g, "")
            .replace(/\s+/g, " ")
            .trim()
            .slice(0, 96);
        }

        function extensionFromUrl(url) {
          const clean = String(url || "").split("?")[0].split("#")[0];
          const match = clean.match(/\.([a-z0-9]{2,5})$/i);
          return match ? "." + match[1].toLowerCase() : ".mp4";
        }

        function isoDateFromEpisodeTitle(title) {
          const months = {
            january: "01", february: "02", march: "03", april: "04",
            may: "05", june: "06", july: "07", august: "08",
            september: "09", october: "10", november: "11", december: "12"
          };
          const match = String(title || "").match(/([A-Za-z]+)\s+(\d{1,2}),\s*(\d{4})/);
          if (!match) return "";
          const month = months[match[1].toLowerCase()];
          if (!month) return "";
          return match[3] + "-" + month + "-" + String(match[2]).padStart(2, "0");
        }

        function readableDateFromEpisodeTitle(title) {
          const months = {
            january: "enero", february: "febrero", march: "marzo", april: "abril",
            may: "mayo", june: "junio", july: "julio", august: "agosto",
            september: "septiembre", october: "octubre", november: "noviembre", december: "diciembre"
          };
          const match = String(title || "").match(/([A-Za-z]+)\s+(\d{1,2}),\s*(\d{4})/);
          if (!match) return "";
          const month = months[match[1].toLowerCase()];
          if (!month) return "";
          return Number(match[2]) + " de " + month + " del " + match[3];
        }

        function getEpisodeFilename(anchor) {
          const card = findEpisodeCard(anchor);
          const title = getEpisodeTitle(card);
          const url = getStoredDownloadUrl(anchor);
          const date = readableDateFromEpisodeTitle(title) || isoDateFromEpisodeTitle(title) || "episodio";
          const showMatch = title.match(/^(.+?)\s+[–-]\s+/);
          const show = sanitizeReadableFilename(showMatch ? showMatch[1] : "WWE");
          return sanitizeReadableFilename(date + (show ? " - " + show : "")) + extensionFromUrl(url);
        }

        const LAST_EPISODE_KEY = "wwe_last_clicked_episode_v1";
        const EPISODE_HISTORY_KEY = "wwe_episode_click_history_v1";

        function readLastEpisode() {
          try {
            return JSON.parse(localStorage.getItem(LAST_EPISODE_KEY) || "null");
          } catch {
            return null;
          }
        }

        function formatRecordTime(value) {
          if (!value) return "";
          try {
            return new Date(value).toLocaleString("es-MX", {
              year: "numeric",
              month: "short",
              day: "2-digit",
              hour: "2-digit",
              minute: "2-digit"
            });
          } catch {
            return "";
          }
        }

        function saveEpisodeInteraction(anchor, action) {
          if (!anchor) return;
          lockDownloadAnchor(anchor);
          const card = findEpisodeCard(anchor);
          const title = getEpisodeTitle(card || anchor);
          const url = getStoredDownloadUrl(anchor);
          const record = {
            title,
            url,
            filename: anchor.dataset.downloadFilename || getEpisodeFilename(anchor),
            date: isoDateFromEpisodeTitle(title),
            action: action || "click",
            at: new Date().toISOString()
          };
          localStorage.setItem(LAST_EPISODE_KEY, JSON.stringify(record));
          try {
            const history = JSON.parse(localStorage.getItem(EPISODE_HISTORY_KEY) || "[]");
            history.unshift(record);
            localStorage.setItem(EPISODE_HISTORY_KEY, JSON.stringify(history.slice(0, 50)));
          } catch {
            localStorage.setItem(EPISODE_HISTORY_KEY, JSON.stringify([record]));
          }
          renderLastEpisodePanel();
        }

        function renderLastEpisodePanel() {
          const mainInner = document.querySelector("main .max-w-7xl");
          if (!mainInner) return;
          const heading = mainInner.querySelector("h1");
          const yearLabel = heading && heading.parentElement ? heading.parentElement.querySelector("p") : null;
          if (heading && heading.textContent.trim().toLowerCase() === "inicio" && yearLabel && !yearLabel.textContent.trim()) {
            const existingPanel = document.getElementById("wwe-last-episode-panel");
            if (existingPanel) existingPanel.remove();
            return;
          }
          let panel = document.getElementById("wwe-last-episode-panel");
          if (!panel) {
            panel = document.createElement("div");
            panel.id = "wwe-last-episode-panel";
            panel.style.cssText = [
              "margin:0 0 16px",
              "padding:13px 15px",
              "border:1px solid rgba(234,179,8,.34)",
              "border-radius:14px",
              "background:linear-gradient(135deg,rgba(234,179,8,.12),rgba(15,23,42,.72))",
              "box-shadow:0 16px 40px rgba(0,0,0,.22)"
            ].join(";");
            mainInner.insertBefore(panel, mainInner.firstChild);
          }
          const record = readLastEpisode();

            ? [record.title, record.action, record.at, record.url].join("|")

          if (panel.dataset.recordSignature === signature) return;
          panel.dataset.recordSignature = signature;
          if (!record) {
            panel.innerHTML = [
              '<p style="margin:0;color:#facc15;font:900 12px/1.2 -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;text-transform:uppercase;letter-spacing:.08em">Ultimo capitulo</p>',
              '<p style="margin:5px 0 0;color:#e2e8f0;font:750 14px/1.35 -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Todavia no has hecho click en ningun capitulo.</p>'
            ].join("");
            return;
          }
          const action = record.action === "download" ? "Descarga iniciada" :
            record.action === "copy" ? "Enlace copiado" :
            record.action === "mac-command" ? "Comando copiado" :
            record.action === "external-manager" ? "Gestor externo" :
            "Click registrado";
          panel.innerHTML = [
            '<p style="margin:0;color:#facc15;font:900 12px/1.2 -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;text-transform:uppercase;letter-spacing:.08em">Ultimo capitulo</p>',
            '<p style="margin:5px 0 0;color:#fff;font:850 15px/1.35 -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"></p>',
            '<p style="margin:4px 0 0;color:#94a3b8;font:650 12px/1.35 -apple-system,BlinkMacSystemFont,Segoe UI,sans-serif"></p>'
          ].join("");
          const lines = panel.querySelectorAll("p");
          lines[1].textContent = record.title || "Episodio";
          lines[2].textContent = action + " · " + formatRecordTime(record.at);
        }

        function hideChooser() {
          chooserOverlay.style.display = "none";
          activeCard = null;
          activeDownloadAnchor = null;
        }

        function showChooser(card) {
          activeCard = card;
          activeDownloadAnchor = card && card.matches && card.matches('a[title="Descargar episodio"]')
            ? card
            : card.querySelector('a[title="Descargar episodio"]');
          if (activeDownloadAnchor) {
            saveEpisodeInteraction(activeDownloadAnchor, "click");
          }
          const title = chooserOverlay.querySelector("#iphone-episode-title");
          if (title) {
            title.textContent = getEpisodeTitle(card);
          }
          chooserOverlay.style.display = "flex";
        }

        function getStoredDownloadUrl(anchor) {
          return anchor ? (anchor.dataset.downloadUrl || anchor.getAttribute("data-download-url") || anchor.getAttribute("href") || "") : "";
        }

        function lockDownloadAnchor(anchor) {
          if (!anchor || anchor.dataset.iosDownloadLocked === "1") return;
          const originalUrl = anchor.getAttribute("href") || anchor.getAttribute("data-download-url") || "";
          if (originalUrl && originalUrl !== "#") {
            anchor.dataset.downloadUrl = originalUrl;
            anchor.setAttribute("data-download-url", originalUrl);
          }
          anchor.setAttribute("href", "#");
          anchor.setAttribute("target", "_self");
          anchor.setAttribute("rel", "noopener noreferrer");
          anchor.setAttribute("role", "button");
          const filename = getEpisodeFilename(anchor);
          anchor.setAttribute("download", filename);
          anchor.dataset.downloadFilename = filename;
          anchor.setAttribute("data-download-filename", filename);
          anchor.dataset.iosDownloadLocked = "1";
        }

        function lockAllMediaLinks(root) {
          const scope = root && root.querySelectorAll ? root : document;
          const anchors = scope.querySelectorAll('a[href], a[data-download-url]');
          anchors.forEach(function (anchor) {
            const href = anchor.getAttribute("href") || "";
            const stored = anchor.getAttribute("data-download-url") || "";
            const title = anchor.getAttribute("title") || "";
            if (title === "Descargar episodio" || /archive\.org|\.(mp4|m4v|mov|webm)(\?|#|$)/i.test(href + " " + stored)) {
              lockDownloadAnchor(anchor);
            }
          });
        }

        function getEpisodeUrl(card) {
          const anchor = card && card.querySelector('a[title="Descargar episodio"]');
          return getStoredDownloadUrl(anchor);
        }

        function normalizeLocalVideoKey(value) {
          return String(value || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/\.[a-z0-9]{2,5}$/i, "")
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "");
        }

        function localVideoKeysForName(name) {
          const clean = String(name || "").split(/[\\/]/).pop() || "";
          const withoutExt = clean.replace(/\.[a-z0-9]{2,5}$/i, "");
          return [clean, withoutExt].map(normalizeLocalVideoKey).filter(Boolean);
        }

        function addLocalVideoFile(file) {
          if (!file || !/\.(mp4|m4v|mov|webm|mkv)$/i.test(file.name || "")) return;
          const names = [file.name, file.webkitRelativePath || ""].filter(Boolean);
          names.forEach(function (name) {
            localVideoKeysForName(name).forEach(function (key) {
              if (!localVideoFiles.has(key)) localVideoFiles.set(key, file);
            });
          });
        }

        function updateLocalLibraryControls() {
          const panel = document.getElementById("wwe-local-library-panel");
          if (!panel) return;
          const status = panel.querySelector("[data-local-status]");
          if (status) status.textContent = localVideoCount ? localVideoCount + " locales" : "elige videos";
          panel.classList.toggle("has-local-videos", localVideoCount > 0);
        }

        function indexLocalVideoFiles(files) {
          localVideoFiles.clear();
          (files || []).forEach(addLocalVideoFile);
          localVideoCount = new Set(Array.from(localVideoFiles.values()).map(function (file) {
            return (file.webkitRelativePath || file.name || "") + "|" + file.size;
          })).size;
          updateLocalLibraryControls();
          patchLocalVideoBadges(document);
          showToast(localVideoCount ? "MicroSD lista: " + localVideoCount + " videos indexados." : "No encontre videos en la seleccion.");
        }

        async function collectFilesFromDirectoryHandle(handle, bucket) {
          for await (const entry of handle.values()) {
            if (entry.kind === "file") {
              bucket.push(await entry.getFile());
            } else if (entry.kind === "directory") {
              await collectFilesFromDirectoryHandle(entry, bucket);
            }
          }
        }

        async function chooseLocalVideoLibrary() {
          if (isAppleMobile()) {
            showToast("En iPhone: abre Archivos, entra a la microSD y selecciona todos los videos del mes.");
            localVideosInput.click();
            return;
          }
          if (window.showDirectoryPicker) {
            try {
              const handle = await window.showDirectoryPicker({ mode: "read" });
              const files = [];
              await collectFilesFromDirectoryHandle(handle, files);
              indexLocalVideoFiles(files);
              return;
            } catch (error) {
              if (error && error.name === "AbortError") return;
              console.warn("No se pudo abrir la carpeta, usando selector de archivos:", error);
            }
          }
          localFileInput.click();
        }

        function getEpisodeShowFromTitle(title) {
          return /^SmackDown\b/i.test(title || "") ? "SmackDown" : /^RAW\b/i.test(title || "") ? "RAW" : "WWE";
        }

        function findLocalVideoFile(card) {
          if (!localVideoFiles.size || !card) return null;
          const anchor = card.querySelector('a[title="Descargar episodio"], a[data-download-url]');
          const title = getEpisodeTitle(card);
          const expected = anchor ? (anchor.dataset.downloadFilename || getEpisodeFilename(anchor)) : "";
          const urlName = anchor ? decodeURIComponent((getStoredDownloadUrl(anchor).split("?")[0].split("#")[0].split("/").pop() || "")) : "";
          const readable = readableDateFromEpisodeTitle(title);
          const iso = isoDateFromEpisodeTitle(title);
          const show = getEpisodeShowFromTitle(title);
          const candidates = [
            expected,
            urlName,
            readable && show ? readable + " - " + show : "",
            iso && show ? iso + " - " + show : "",
            title
          ].filter(Boolean);
          for (const candidate of candidates) {
            for (const key of localVideoKeysForName(candidate)) {
              if (localVideoFiles.has(key)) return localVideoFiles.get(key);
            }
          }
          return null;
        }

        function patchLocalVideoBadges(root) {
          const scope = root && root.querySelectorAll ? root : document;
          const cards = scope.matches && scope.matches("div.cursor-pointer.group.overflow-hidden")
            ? [scope]
            : Array.from(scope.querySelectorAll("div.cursor-pointer.group.overflow-hidden"));
          cards.forEach(function (card) {
            const existing = card.querySelector(".wwe-local-video-badge");
            const file = findLocalVideoFile(card);
            if (!file) {
              if (existing) existing.remove();
              return;
            }
            if (existing) return;
            const badge = document.createElement("span");
            badge.className = "wwe-local-video-badge";
            badge.textContent = "SD";
            badge.title = "Disponible desde archivo local";
            card.appendChild(badge);
          });
        }

        function ensureLocalLibraryControls() {
          if (document.getElementById("wwe-local-library-panel")) {
            updateLocalLibraryControls();
            return;
          }
          const panel = document.createElement("div");
          panel.id = "wwe-local-library-panel";
          panel.innerHTML = [
            '<button type="button" data-local-pick>Videos SD</button>',
            '<span data-local-status>elige videos</span>'
          ].join("");
          panel.querySelector("button").addEventListener("click", chooseLocalVideoLibrary);
          document.body.appendChild(panel);
          updateLocalLibraryControls();
        }

        function patchInlineVideos(root) {
          const scope = root && root.querySelectorAll ? root : document;
          const videos = scope.matches && scope.matches("video")
            ? [scope]
            : Array.from(scope.querySelectorAll("video"));
          videos.forEach(function (video) {
            if (video.id === "iphone-native-video" || video.closest("#iphone-inline-player")) return;
            video.pause();
            video.removeAttribute("src");
            video.removeAttribute("poster");
            video.removeAttribute("controls");
            video.removeAttribute("autoplay");
            video.preload = "none";
            video.style.display = "none";
          });
        }

        function closeInlinePlayer() {
          const video = playerOverlay.querySelector("#iphone-native-video");
          if (video) {
            video.pause();
            video.removeAttribute("src");
            video.load();
          }
          if (currentLocalVideoUrl) {
            URL.revokeObjectURL(currentLocalVideoUrl);
            currentLocalVideoUrl = "";
          }
          playerOverlay.style.display = "none";
        }

        function isIphonePlayableLocalFile(file) {
          return /\.(mp4|m4v|mov)$/i.test((file && file.name) || "");
        }

        function playLocalVideoFile(file) {
          if (!file) return false;
          if (isAppleMobile() && !isIphonePlayableLocalFile(file)) {
            showToast("iPhone no reproduce este formato. Usa MP4, M4V o MOV para verlo local.");
            alert("iPhone no puede reproducir este archivo localmente. Convierte o descarga el capitulo en MP4/M4V/MOV.");
            return false;
          }
          const video = playerOverlay.querySelector("#iphone-native-video");
          const title = playerOverlay.querySelector("#iphone-player-title");
          const source = playerOverlay.querySelector("#iphone-player-source");
          if (!video) return false;
          if (currentLocalVideoUrl) {
            URL.revokeObjectURL(currentLocalVideoUrl);
            currentLocalVideoUrl = "";
          }
          currentLocalVideoUrl = URL.createObjectURL(file);
          if (title) title.textContent = file.name || "Video local";
          if (source) {
            source.textContent = "LOCAL · sin datos";
            source.className = "iphone-player-source iphone-player-source-local";
          }
          video.src = currentLocalVideoUrl;
          video.controls = true;
          video.style.display = "block";
          video.preload = "metadata";
          playerOverlay.style.display = "flex";
          showToast("LOCAL: reproduciendo el archivo seleccionado sin datos.");
          try {
            const playPromise = video.play();
            if (playPromise && typeof playPromise.catch === "function") {
              playPromise.catch(function () {});
            }
          } catch {}
          return true;
        }

        async function showInlinePlayer(card) {
          const localFile = findLocalVideoFile(card);
          if (localFile && isAppleMobile() && !isIphonePlayableLocalFile(localFile)) {
            showToast("Ese archivo local no se puede reproducir en iPhone. Uso Archive.");
          }
          const playableLocalFile = localFile && (!isAppleMobile() || isIphonePlayableLocalFile(localFile)) ? localFile : null;
          const url = playableLocalFile ? URL.createObjectURL(playableLocalFile) : getEpisodeUrl(card);
          if (!url) return false;
          const video = playerOverlay.querySelector("#iphone-native-video");
          const title = playerOverlay.querySelector("#iphone-player-title");
          const source = playerOverlay.querySelector("#iphone-player-source");
          if (title) title.textContent = getEpisodeTitle(card);
          if (source) {
            source.textContent = playableLocalFile ? "LOCAL · sin datos" : "ARCHIVE · usa datos";
            source.className = "iphone-player-source " + (playableLocalFile ? "iphone-player-source-local" : "iphone-player-source-archive");
          }
          if (!video) return false;
          if (currentLocalVideoUrl) {
            URL.revokeObjectURL(currentLocalVideoUrl);
            currentLocalVideoUrl = "";
          }
          if (playableLocalFile) currentLocalVideoUrl = url;
          video.src = url;
          video.controls = true;
          video.style.display = "block";
          video.preload = "metadata";
          playerOverlay.style.display = "flex";
          showToast(playableLocalFile ? "LOCAL: reproduciendo sin datos desde microSD." : "ARCHIVE: reproduciendo desde internet.");
          try {
            const playPromise = video.play();
            if (playPromise && typeof playPromise.catch === "function") {
              playPromise.catch(function () {});
            }
          } catch {}
          return true;
        }

        async function openEpisode(card) {
          const anchor = card && card.querySelector('a[title="Descargar episodio"]');
          if (anchor) {
            saveEpisodeInteraction(anchor, "click");
            if (!(await showInlinePlayer(card))) {
              window.location.href = getStoredDownloadUrl(anchor);
            }
          }
        }

        function setButtonState(anchor, label, busy) {
          const span = anchor.querySelector("span");
          if (span) span.textContent = label;
          anchor.style.opacity = busy ? "0.7" : "";
          anchor.style.pointerEvents = busy ? "none" : "";
        }

        async function copyDownloadLink(url) {
          try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
              await navigator.clipboard.writeText(url);
              return true;
            }
          } catch (error) {
            console.warn("No se pudo copiar automaticamente:", error);
          }
          const box = document.createElement("textarea");
          box.value = url;
          box.setAttribute("readonly", "");
          box.style.cssText = "position:fixed;left:-9999px;top:0";
          document.body.appendChild(box);
          box.select();
          try {
            document.execCommand("copy");
            return true;
          } catch (error) {
            console.warn("No se pudo copiar con fallback:", error);
            return false;
          } finally {
            box.remove();
          }
        }

        async function copyDownloadPackage(url, filename) {
          await copyDownloadLink(filename + "\n" + url);
        }

        function shellQuote(value) {
          return "'" + String(value || "").replace(/'/g, "'\''") + "'";
        }

        function buildMacCurlCommand(anchor) {
          lockDownloadAnchor(anchor);
          const url = getStoredDownloadUrl(anchor);
          const filename = anchor.dataset.downloadFilename || getEpisodeFilename(anchor);
          return "curl -L --fail --continue-at - --output "
            + shellQuote(filename)
            + " "
            + shellQuote(url);
        }

        async function copyMacCurlCommand(anchor) {
          const command = buildMacCurlCommand(anchor);
          await copyDownloadLink(command);
          showToast("Comando para Mac copiado. Pegalo en Terminal dentro de la microSD.");
        }

        function monthCardTitle(monthCard) {
          const title = monthCard && monthCard.querySelector(".wwe-month-title");
          return title ? title.textContent.trim() : "Mes";
        }

        function showMatchesFilter(title, filter) {
          if (filter === "ALL") return true;
          if (filter === "SmackDown") return /^SmackDown\b/i.test(title);
          return /^RAW\b/i.test(title);
        }

        function monthAnchorsForShow(monthCard, filter) {
          return Array.from(monthCard.querySelectorAll("div.cursor-pointer.group.overflow-hidden"))
            .map(function (card) {
              const anchor = card.querySelector('a[title="Descargar episodio"], a[data-download-url]');
              if (!anchor) return null;
              const title = getEpisodeTitle(card);
              return showMatchesFilter(title, filter) ? anchor : null;
            })
            .filter(Boolean);
        }

        function buildMonthBatchCommand(monthCard, filter) {
          const anchors = monthAnchorsForShow(monthCard, filter);
          const showName = filter === "ALL" ? "WWE" : filter === "SmackDown" ? "SmackDown" : "RAW";
          const folder = sanitizeReadableFilename(showName + " - " + monthCardTitle(monthCard));
          const lines = [
            "mkdir -p " + shellQuote(folder),
            "cd " + shellQuote(folder)
          ];
          anchors.forEach(function (anchor) {
            lines.push(buildMacCurlCommand(anchor));
          });
          return {
            command: lines.join("\n"),
            count: anchors.length,
            folder: folder
          };
        }

        function buildMonthAria2Command(monthCard, filter) {
          const anchors = monthAnchorsForShow(monthCard, filter);
          const showName = filter === "ALL" ? "WWE" : filter === "SmackDown" ? "SmackDown" : "RAW";
          const folder = sanitizeReadableFilename(showName + " - " + monthCardTitle(monthCard));
          const listName = sanitizeFilenamePart("aria2-" + folder) + ".txt";
          const lines = [
            "command -v aria2c >/dev/null || { echo 'Falta aria2c. Instala con: brew install aria2'; exit 1; }",
            "mkdir -p " + shellQuote(folder),
            "cat > " + shellQuote(listName) + " <<'ARIA2LIST'"
          ];
          anchors.forEach(function (anchor) {
            lockDownloadAnchor(anchor);
            const url = getStoredDownloadUrl(anchor);
            const filename = anchor.dataset.downloadFilename || getEpisodeFilename(anchor);
            if (!url) return;
            lines.push(url);
            lines.push("  out=" + filename);
          });
          lines.push("ARIA2LIST");
          lines.push("aria2c -c -x 4 -s 4 -j 2 --auto-file-renaming=false --dir=" + shellQuote(folder) + " -i " + shellQuote(listName));
          return {
            command: lines.join("\n"),
            count: anchors.length,
            folder: folder
          };
        }

        async function copyMonthBatchCommand(monthCard, filter) {
          const batch = buildMonthBatchCommand(monthCard, filter);
          if (!batch.count) {
            showToast("No hay capitulos de ese tipo en este mes.");
            return;
          }
          await copyDownloadLink(batch.command);
          showToast("Copiados " + batch.count + " comandos para " + batch.folder + ".");
        }

        async function copyMonthAria2Command(monthCard, filter) {
          const batch = buildMonthAria2Command(monthCard, filter);
          if (!batch.count) {
            showToast("No hay capitulos de ese tipo en este mes.");
            return;
          }
          await copyDownloadLink(batch.command);
          showToast("ARIA2 copiado para " + batch.count + " capitulos de " + batch.folder + ".");
        }

        function makeMonthBatchButton(monthCard, filter, label) {
          const button = document.createElement("button");
          const count = monthAnchorsForShow(monthCard, filter).length;
          button.type = "button";
          button.className = "wwe-month-batch-button";
          button.textContent = label + (count ? " " + count : "");
          button.title = "Copiar comandos de " + label + " para este mes";
          button.disabled = count === 0;
          button.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();
            if (event.stopImmediatePropagation) event.stopImmediatePropagation();
            copyMonthBatchCommand(monthCard, filter);
          });
          return button;
        }

        function makeMonthAria2Button(monthCard, filter, label) {
          const button = document.createElement("button");
          const count = monthAnchorsForShow(monthCard, filter).length;
          button.type = "button";
          button.className = "wwe-month-batch-button wwe-month-aria2-button";
          button.textContent = "A2 " + label + (count ? " " + count : "");
          button.title = "Copiar comando rapido aria2c de " + label + " para este mes";
          button.disabled = count === 0;
          button.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();
            if (event.stopImmediatePropagation) event.stopImmediatePropagation();
            copyMonthAria2Command(monthCard, filter);
          });
          return button;
        }

        function patchMonthBatchControls(root) {
          const scope = root && root.querySelectorAll ? root : document;
          const cards = scope.matches && scope.matches(".wwe-month-card")
            ? [scope]
            : Array.from(scope.querySelectorAll(".wwe-month-card"));
          cards.forEach(function (monthCard) {
            const summary = monthCard.querySelector("summary");
            if (!summary) return;
            const signature = Array.from(monthCard.querySelectorAll('a[title="Descargar episodio"], a[data-download-url]'))
              .map(function (anchor) {
                return getStoredDownloadUrl(anchor);
              })
              .join("|");
            const existing = summary.querySelector(".wwe-month-actions");
            if (existing && existing.dataset.signature === signature) return;
            if (existing) existing.remove();
            const actions = document.createElement("div");
            actions.className = "wwe-month-actions";
            actions.dataset.signature = signature;
            actions.append(
              makeMonthAria2Button(monthCard, "SmackDown", "SD"),
              makeMonthAria2Button(monthCard, "RAW", "RAW"),
              makeMonthAria2Button(monthCard, "ALL", "TODO")
            );
            summary.appendChild(actions);
          });
        }

        async function openExternalDownloadManager(anchor) {
          lockDownloadAnchor(anchor);
          const url = getStoredDownloadUrl(anchor);
          const filename = anchor.dataset.downloadFilename || getEpisodeFilename(anchor);
          if (!url) return;

          if (navigator.share) {
            try {
              await navigator.share({
                title: filename,
                text: filename,
                url: url
              });
              showToast("Elige tu gestor de descargas en Compartir.");
              return;
            } catch (error) {
              if (error && error.name === "AbortError") return;
              console.warn("No se pudo abrir Compartir:", error);
            }
          }

          await copyDownloadPackage(url, filename);
          showToast("Copie nombre y enlace. Pegalos en tu gestor de descargas.");
        }

        function buildShortcutUrl(url) {
          return "shortcuts://run-shortcut?name="
            + encodeURIComponent(IOS_SHORTCUT_NAME)
            + "&input=text&text="
            + encodeURIComponent(url);
        }

        async function openIosShortcutDownload(anchor) {
          lockDownloadAnchor(anchor);
          const url = getStoredDownloadUrl(anchor);
          const filename = anchor.dataset.downloadFilename || getEpisodeFilename(anchor);
          if (!url) return;
          await copyDownloadLink(filename);
          showToast("Abriendo Atajos con nombre: " + filename);
          window.location.href = buildShortcutUrl(url);
        }

        async function downloadToFiles(anchor) {
          lockDownloadAnchor(anchor);
          const url = getStoredDownloadUrl(anchor);
          const filename = anchor.dataset.downloadFilename || getEpisodeFilename(anchor);
          if (!url) return;

          if (isAppleMobile()) {
            await openIosShortcutDownload(anchor);
            return;
          }

          setButtonState(anchor, "Preparando...", true);

          try {
            const direct = document.createElement("a");
            direct.href = url;
            direct.download = filename;
            direct.target = "_blank";
            direct.rel = "noopener noreferrer";
            direct.style.display = "none";
            document.body.appendChild(direct);
            direct.click();
            setTimeout(function () {
              direct.remove();
            }, 1000);
            await copyDownloadPackage(url, filename);
            showToast("Descarga abierta. Tambien copie nombre y enlace por si usas gestor externo.");
          } catch (error) {
            console.error("No se pudo descargar el archivo:", error);
            await copyDownloadPackage(url, filename);
            showToast("Descarga bloqueada por el navegador. Nombre y enlace copiados.");
          } finally {
            setButtonState(anchor, "Descargar", false);
          }
        }

        function getDownloadAnchorFromEventTarget(target) {
          if (!target || !target.closest) return null;
          return target.closest('a[title="Descargar episodio"], a[data-download-url], a[href$=".mp4"], a[href*=".mp4?"], a[href*="archive.org"]');
        }

        function strictDownloadClickGuard(event) {
          const anchor = getDownloadAnchorFromEventTarget(event.target);
          if (!anchor) return;
          if (event.target.closest && event.target.closest('button[title*="Marcar"]')) return;
          event.preventDefault();
          event.stopPropagation();
          if (event.stopImmediatePropagation) {
            event.stopImmediatePropagation();
          }
          lockDownloadAnchor(anchor);
          activeDownloadAnchor = anchor;
          const card = findEpisodeCard(anchor);
          activeCard = card;
          showChooser(card || anchor);
        }

        function patchDownloadButtons(root) {
          const scope = root && root.querySelectorAll ? root : document;
          lockAllMediaLinks(scope);
          const anchors = scope.querySelectorAll('a[title="Descargar episodio"], a[data-download-url]');
          anchors.forEach(function (anchor) {
            lockDownloadAnchor(anchor);
            if (anchor.dataset.iosDownloadPatched === "1") return;
            anchor.dataset.iosDownloadPatched = "1";
            anchor.addEventListener("click", function (event) {
              event.preventDefault();
              event.stopPropagation();
              if (event.stopImmediatePropagation) {
                event.stopImmediatePropagation();
              }
              activeDownloadAnchor = anchor;
              activeCard = findEpisodeCard(anchor);
              showChooser(activeCard || anchor);
            }, true);
          });
        }

        function patchCardPlayButton(card) {
          const playLabel = Array.from(card.querySelectorAll("div span")).find(function (span) {
            if (span.closest('a[title="Descargar episodio"], a[data-download-url]')) return false;
            const text = (span.textContent || "").trim();
            const parent = span.parentElement;
            return /descargar|download|watch now|reproducir/i.test(text)
              && parent
              && parent.querySelector("svg")
              && /text-yellow-400/.test(parent.className || "");
          });
          if (playLabel) playLabel.textContent = "Ver";

          const buttons = Array.from(card.querySelectorAll("button"));
          buttons.forEach(function (button) {
            const title = button.getAttribute("title") || "";
            if (/marcar/i.test(title)) return;
            if (button.closest('a[title="Descargar episodio"], a[data-download-url]')) return;
            const label = (button.textContent || "").trim();
            if (!label || /sin ver/i.test(label)) return;
            if (/descargar|download|watch now|reproducir/i.test(label)) {
              const span = button.querySelector("span");
              if (span) {
                span.textContent = "Ver";
              } else {
                button.textContent = "Ver";
              }
              button.setAttribute("aria-label", "Ver " + getEpisodeTitle(card));
            }
          });
        }

        function patchEpisodeCards(root) {
          const scope = root && root.querySelectorAll ? root : document;
          const cards = scope.querySelectorAll("div.cursor-pointer.group.overflow-hidden");
          cards.forEach(function (card) {
            patchCardPlayButton(card);
            if (card.dataset.iosCardPatched === "1") return;
            if (!card.querySelector('a[title="Descargar episodio"]')) return;
            card.dataset.iosCardPatched = "1";
            card.setAttribute("role", "button");
            card.setAttribute("aria-label", "Ver " + getEpisodeTitle(card));
            card.addEventListener("click", function (event) {
              if (event.target.closest('a[title="Descargar episodio"]')) return;
              if (event.target.closest('button[title*="Marcar"]')) return;
              event.preventDefault();
              event.stopPropagation();
              if (event.stopImmediatePropagation) {
                event.stopImmediatePropagation();
              }
              activeCard = card;
              activeDownloadAnchor = card.querySelector('a[title="Descargar episodio"]');
              openEpisode(card);
            }, true);
          });
        }

        const observer = new MutationObserver(function (mutations) {
          mutations.forEach(function (mutation) {
            mutation.addedNodes.forEach(function (node) {
              if (node.nodeType === 1) {
                lockAllMediaLinks(node);
                patchDownloadButtons(node);
                patchEpisodeCards(node);
                patchMonthBatchControls(node);
                patchInlineVideos(node);
                patchLocalVideoBadges(node);
                applyDownloadCenterCopy();
              }
            });
          });
        });

        playerOverlay.addEventListener("click", function (event) {
          const action = event.target && event.target.getAttribute("data-action");
          if (action === "close-player" || event.target === playerOverlay) {
            closeInlinePlayer();
          }
        });

        chooserOverlay.addEventListener("click", function (event) {
          if (event.target === chooserOverlay) {
            hideChooser();
            return;
          }
          const action = event.target && event.target.getAttribute("data-action");
          if (!action) return;
          if (action === "cancel") {
            hideChooser();
            return;
          }
          if (action === "copy") {
            const anchor = activeDownloadAnchor;
            hideChooser();
            if (anchor) {
              saveEpisodeInteraction(anchor, "copy");
              lockDownloadAnchor(anchor);
              copyDownloadPackage(getStoredDownloadUrl(anchor), anchor.dataset.downloadFilename || getEpisodeFilename(anchor));
              showToast("Nombre y enlace copiados.");
            }
            return;
          }
          if (action === "mac-command") {
            const anchor = activeDownloadAnchor;
            hideChooser();
            if (anchor) {
              saveEpisodeInteraction(anchor, "mac-command");
              copyMacCurlCommand(anchor);
            }
            return;
          }
          if (action === "external-manager") {
            const anchor = activeDownloadAnchor;
            hideChooser();
            if (anchor) {
              saveEpisodeInteraction(anchor, "external-manager");
              openExternalDownloadManager(anchor);
            }
            return;
          }
          if (action === "download") {
            const anchor = activeDownloadAnchor;
            hideChooser();
            if (anchor) {
              saveEpisodeInteraction(anchor, "download");
              downloadToFiles(anchor);
            }
          }
        });

        function applyDownloadCenterCopy() {
          document.title = "WWE Download Center";
          const headings = Array.from(document.querySelectorAll("h1,h2,p,span,button"));
          headings.forEach(function (el) {
            const text = (el.textContent || "").trim();
            if (text === "WWE Archive Viewer") el.textContent = "WWE Download Center";
            if (text === "TODO") el.textContent = "Inicio";
            if (text === "Watch Now" || text === "Reproducir") el.textContent = "Ver";
          });
          hideShowTabs();
          ensureLocalLibraryControls();
          patchLocalVideoBadges(document);
          renderLastEpisodePanel();
        }

        function hideShowTabs() {
          const groups = Array.from(document.querySelectorAll("header div"));
          groups.forEach(function (group) {
            const labels = Array.from(group.querySelectorAll(":scope > button")).map(function (button) {
              return (button.textContent || "").trim().toUpperCase();
            });
            if (labels.includes("INICIO") && labels.includes("RAW") && labels.includes("SMACKDOWN")) {
              group.style.display = "none";
              group.setAttribute("aria-hidden", "true");
            }
          });
        }

        document.addEventListener("DOMContentLoaded", function () {
          lockAllMediaLinks(document);
          patchDownloadButtons(document);
          patchEpisodeCards(document);
          patchMonthBatchControls(document);
          patchInlineVideos(document);
          patchLocalVideoBadges(document);
          applyDownloadCenterCopy();
          renderLastEpisodePanel();
          observer.observe(document.body, { childList: true, subtree: true });
        });
      })();

      (function () {
        const monthNames = {
          "01": "Enero", "02": "Febrero", "03": "Marzo", "04": "Abril",
          "05": "Mayo", "06": "Junio", "07": "Julio", "08": "Agosto",
          "09": "Septiembre", "10": "Octubre", "11": "Noviembre", "12": "Diciembre"
        };
        const englishMonths = {
          january: "01", february: "02", march: "03", april: "04",
          may: "05", june: "06", july: "07", august: "08",
          september: "09", october: "10", november: "11", december: "12",
          jan: "01", feb: "02", mar: "03", apr: "04", jun: "06",
          jul: "07", aug: "08", sep: "09", sept: "09", oct: "10",
          nov: "11", dec: "12"
        };
        let scheduled = false;
        let internalMove = false;

        function textOf(node) {
          return (node && node.textContent || "").replace(/\s+/g, " ").trim();
        }

        function currentView() {
          const h1 = Array.from(document.querySelectorAll("h1")).find(function (node) {
            return ["INICIO", "TODO", "RAW", "SMACKDOWN"].includes(textOf(node).toUpperCase());
          });
          const view = h1 ? textOf(h1).toUpperCase() : "";
          return view === "INICIO" ? "TODO" : view;
        }

        function findYearBar() {
          const label = Array.from(document.querySelectorAll("span")).find(function (node) {
            return textOf(node).toLowerCase().replace(":", "") === "años";
          });
          return label ? label.closest("div.bg-gradient-to-r") : null;
        }

        function findMain() {
          return document.querySelector("main.flex-1.min-w-0.overflow-auto");
        }

        function enhanceYearLayout(enabled) {
          const yearBar = findYearBar();
          const main = findMain();
          const shell = yearBar && yearBar.parentElement;
          document.body.classList.toggle("wwe-fast-todo", enabled && !!yearBar && !!main);
          if (!yearBar || !main || !shell) return;
          shell.classList.toggle("wwe-year-shell", enabled);
          yearBar.classList.toggle("wwe-year-sidebar", enabled);
          main.classList.toggle("wwe-main-area", enabled);
        }

        function dateFromEpisodeCard(card) {
          const title = textOf(card.querySelector("p.text-white")) || textOf(card);
          const match = title.match(/([A-Za-z]+)\s+(\d{1,2}),\s*(\d{4})/);
          if (!match) return "";
          const month = englishMonths[match[1].toLowerCase()];
          return month ? match[3] + "-" + month + "-" + String(match[2]).padStart(2, "0") : "";
        }

        function dateFromPpv(node) {
          const text = textOf(node);
          const monthMatch = text.match(/\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Sept|Oct|Nov|Dec)\b/i);
          const dayMatch = text.match(/\b(\d{1,2})\b/);
          const year = (textOf(document.querySelector("h1 + p")) || text).match(/\b(19|20)\d{2}\b/);
          if (!monthMatch || !dayMatch || !year) return "";
          return year[0] + "-" + englishMonths[monthMatch[1].toLowerCase()] + "-" + String(dayMatch[1]).padStart(2, "0");
        }

        function itemDate(node) {
          if (node.matches && node.matches("div.cursor-pointer.group.overflow-hidden")) return dateFromEpisodeCard(node);
          return dateFromPpv(node);
        }

        function isEpisodeOrPpv(node) {
          if (!node || node.nodeType !== 1) return false;
          if (node.matches("div.cursor-pointer.group.overflow-hidden")) return true;
          return /WWE PPV|Premium Live Event|BIG 4|PPV/.test(textOf(node));
        }

        function findAllList() {
          const main = findMain();
          if (!main) return null;
          const candidates = Array.from(main.querySelectorAll("div.flex.flex-col.gap-1\\.5"));
          return candidates.find(function (node) {
            return Array.from(node.children).some(isEpisodeOrPpv);
          }) || null;
        }

        function monthKeyFromDate(date) {
          return date && date.slice(0, 7);
        }

        function monthTitle(key) {
          const parts = key.split("-");
          return (monthNames[parts[1]] || parts[1]) + " " + parts[0];
        }

        function restoreOriginalList() {
          const grouped = document.querySelector(".wwe-month-stack[data-wwe-signature]");
          document.querySelectorAll(".wwe-source-list-hidden").forEach(function (list) {
            list.classList.remove("wwe-source-list-hidden");
            list.removeAttribute("aria-hidden");
          });
          if (!grouped) return;
          internalMove = true;
          grouped.remove();
          internalMove = false;
        }

        function groupTodoByMonth() {
          if (currentView() !== "TODO") {
            enhanceYearLayout(false);
            restoreOriginalList();
            return;
          }
          enhanceYearLayout(true);

          const list = findAllList();
          if (!list || list.dataset.wweGrouped === "1") return;

          const items = Array.from(list.children).filter(isEpisodeOrPpv);
          if (!items.length) return;

          const signature = items.map(function (item) {
            return itemDate(item) + "|" + textOf(item).slice(0, 90);
          }).join("||");
          const existing = document.querySelector(".wwe-month-stack");
          if (existing && existing.dataset.wweSignature === signature) return;
          if (existing) existing.remove();

          const grouped = document.createElement("div");
          grouped.className = "wwe-month-stack";
          grouped.dataset.wweSignature = signature;

          const buckets = new Map();
          items.forEach(function (item) {
            const date = itemDate(item);
            const key = monthKeyFromDate(date) || "Sin fecha";
            if (!buckets.has(key)) buckets.set(key, []);
            buckets.get(key).push(item);
          });

          Array.from(buckets.keys()).sort().forEach(function (key, index) {
            const details = document.createElement("details");
            details.className = "wwe-month-card";
            details.open = index === 0 || localStorage.getItem("wwe-open-month-" + key) === "1";
            details.addEventListener("toggle", function () {
              localStorage.setItem("wwe-open-month-" + key, details.open ? "1" : "0");
            });

            const summary = document.createElement("summary");
            const title = document.createElement("span");
            title.className = "wwe-month-title";
            title.textContent = key === "Sin fecha" ? "Sin fecha" : monthTitle(key);
            const count = document.createElement("span");
            count.className = "wwe-month-count";
            count.textContent = buckets.get(key).length + " elementos";
            summary.append(title, count);

            const grid = document.createElement("div");
            grid.className = "wwe-month-grid";
            buckets.get(key).forEach(function (item) {
              const clone = item.cloneNode(true);
              clone.dataset.wweFastItem = "1";
              if (!clone.matches("div.cursor-pointer.group.overflow-hidden")) clone.classList.add("wwe-ppv-item");
              grid.appendChild(clone);
            });

            details.append(summary, grid);
            grouped.appendChild(details);
          });

          internalMove = true;
          list.classList.add("wwe-source-list-hidden");
          list.setAttribute("aria-hidden", "true");
          list.insertAdjacentElement("afterend", grouped);
          internalMove = false;
          if (typeof patchDownloadButtons === "function") patchDownloadButtons(grouped);
          if (typeof patchEpisodeCards === "function") patchEpisodeCards(grouped);
          if (typeof patchMonthBatchControls === "function") patchMonthBatchControls(grouped);
        }

        function schedule() {
          if (internalMove || scheduled) return;
          scheduled = true;
          requestAnimationFrame(function () {
            scheduled = false;
            groupTodoByMonth();
          });
        }

        document.addEventListener("DOMContentLoaded", schedule);
        window.addEventListener("load", schedule);
        document.addEventListener("click", function (event) {
          if (event.target && event.target.closest && event.target.closest("button")) {
            setTimeout(schedule, 80);
          }
        }, true);

        new MutationObserver(schedule).observe(document.documentElement, {
          childList: true,
          subtree: true
        });
      })();
    </script>
  </body>
</html>
